<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Лав Кафé</title>
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/auth.css">
</head>
<body class="page-enter">
    <div class="auth-page">
        <canvas id="auth-particles-canvas"></canvas>
        
        <div class="auth-card">
            <svg aria-hidden="true" class="auth-ornament" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
                <line x1="0" y1="15" x2="40" y2="15" stroke="#BB9457" stroke-width="1"/>
                <rect x="45" y="10" width="10" height="10" fill="none" stroke="#BB9457" stroke-width="1" transform="rotate(45 50 15)"/>
                <line x1="60" y1="15" x2="100" y2="15" stroke="#BB9457" stroke-width="1"/>
            </svg>
            
            <h1 class="auth-title">Создать аккаунт</h1>
            <p class="auth-subtitle">Присоединяйтесь к опыту Лав Кафе</p>
            
            <form class="auth-form" id="register-form">
                <div class="form-group">
                    <input type="text" id="firstname" class="form-input" required>
                    <label for="firstname" class="form-label">Имя</label>
                    <div class="error-message" id="firstname-error"></div>
                </div>
                
                <div class="form-group">
                    <input type="text" id="lastname" class="form-input" required>
                    <label for="lastname" class="form-label">Фамилия</label>
                    <div class="error-message" id="lastname-error"></div>
                </div>
                
                <div class="form-group">
                    <input type="email" id="email" class="form-input" required>
                    <label for="email" class="form-label">Электронная почта</label>
                    <div class="error-message" id="email-error"></div>
                </div>
                
                <div class="form-group">
                    <input type="tel" id="phone" class="form-input">
                    <label for="phone" class="form-label">Телефон (необязательно)</label>
                    <div class="error-message" id="phone-error"></div>
                </div>
                
                <div class="form-group">
                    <div class="password-wrapper">
                        <input type="password" id="password" class="form-input" required>
                        <label for="password" class="form-label">Пароль</label>
                        <button type="button" class="password-toggle" data-target="password" aria-label="Показать пароль">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strength-fill"></div>
                        </div>
                        <div class="strength-text" id="strength-text">Введите пароль</div>
                    </div>
                    <div class="error-message" id="password-error"></div>
                </div>
                
                <div class="form-group">
                    <div class="password-wrapper">
                        <input type="password" id="confirm-password" class="form-input" required>
                        <label for="confirm-password" class="form-label">Подтвердить пароль</label>
                        <button type="button" class="password-toggle" data-target="confirm-password" aria-label="Показать пароль">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <div class="error-message" id="confirm-password-error"></div>
                </div>
                
                <div class="checkbox-group">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="terms" required>
                        <span class="checkbox-box"></span>
                    </label>
                    <label for="terms" class="checkbox-label">
                        Я принимаю <a href="#">условия использования</a>
                    </label>
                </div>
                <div class="error-message" id="terms-error"></div>
                
                <button type="submit" class="auth-button">Зарегистрироваться</button>
            </form>
            
            <div class="auth-links">
                <a href="login.html">Уже есть аккаунт? Войти</a>
                <br>
                <a href="guest.html">Продолжить как гость</a>
                <a href="index.html" class="back-link">← Вернуться на главную</a>
            </div>
        </div>
    </div>
    
    <script src="../static/js/main.js" defer></script>
    <script src="../static/js/auth.js" defer></script>
</body>
</html>
