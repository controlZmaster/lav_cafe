<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню - Лав Кафé</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <!-- Preload des ressources critiques -->
    <link rel="preload" href="../static/css/base.css" as="style">
    <link rel="preload" href="../static/css/menu.css" as="style">
    <link rel="preload" href="../static/js/main.js" as="script">
    <link rel="preload" href="../static/js/cart.js" as="script">
    <link rel="preload" href="../static/js/menu.js" as="script">
    
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/menu.css">
</head>
<body class="page-enter">
    <a href="#main-content" class="skip-link">Перейти к содержанию</a>
    
    <!-- TOP NAVBAR -->
    <nav class="navbar" role="navigation" aria-label="Основная навигация">
        <div class="navbar-content">
            <div class="navbar-left">
                <a href="index.html" class="logo-text">Лав Кафé</a>
            </div>
            
            <div class="navbar-center">
            </div>
            
            <div class="navbar-right">
                <button class="cart-toggle" id="cart-toggle-btn" type="button" aria-label="Корзина">
                    <svg aria-hidden="true" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-text">Корзина</span>
                    <span class="cart-badge" id="cart-badge">0</span>
                </button>
                <button class="mobile-menu-btn" id="mobile-menu-btn">
                    <svg aria-hidden="true" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">
        <!-- CATEGORY SIDEBAR -->
        <aside class="category-sidebar" id="category-sidebar">
            <nav class="category-nav">
                <a href="#entrees" class="category-link active" data-category="entrees">
                    <span class="category-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2a10 10 0 0 1 10 10c0 5-4 8-10 8s-10-3-10-8a10 10 0 0 1 10-10z"></path>
                            <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                        </svg>
                    </span>
                    <span class="category-label">Горячие Закуски</span>
                </a>
                <a href="#soupes" class="category-link" data-category="soupes">
                    <span class="category-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 11h16a2 2 0 0 1 2 2v2a6 6 0 0 1-6 6H8a6 6 0 0 1-6-6v-2a2 2 0 0 1 2-2z"></path>
                            <path d="M6 11V7a6 6 0 0 1 12 0v4"></path>
                        </svg>
                    </span>
                    <span class="category-label">Первые блюда</span>
                </a>
                <a href="#plats" class="category-link" data-category="plats">
                    <span class="category-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                            <path d="M2 17l10 5 10-5"></path>
                            <path d="M2 12l10 5 10-5"></path>
                        </svg>
                    </span>
                    <span class="category-label">Гарниры</span>
                </a>
                <a href="#accompagnements" class="category-link" data-category="accompagnements">
                    <span class="category-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="9" y1="21" x2="9" y2="9"></line>
                        </svg>
                    </span>
                    <span class="category-label">Соусы</span>
                </a>
                <a href="#specialites" class="category-link" data-category="specialites">
                    <span class="category-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                        </svg>
                    </span>
                    <span class="category-label">Русские специалитеты</span>
                </a>
                <a href="#desserts" class="category-link" data-category="desserts">
                    <span class="category-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"></path>
                            <path d="M4 16s.5-2 2-3 4-2 6-2 4.5 1 6 2 2 3 2 3"></path>
                            <path d="M2 21h20"></path>
                            <path d="M7 8v3M12 8v3M17 8v3"></path>
                        </svg>
                    </span>
                    <span class="category-label">Десерты</span>
                </a>
                <a href="#boissons" class="category-link" data-category="boissons">
                    <span class="category-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
                            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
                            <line x1="6" y1="1" x2="6" y2="4"></line>
                            <line x1="10" y1="1" x2="10" y2="4"></line>
                            <line x1="14" y1="1" x2="14" y2="4"></line>
                        </svg>
                    </span>
                    <span class="category-label">Напитки</span>
                </a>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content" role="main" id="main-content">
            <!-- SEARCH BAR -->
            <div class="search-bar">
                <svg aria-hidden="true" class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input 
                    type="text" 
                    id="search-input" 
                    class="search-input" 
                    placeholder="Найти блюдо..."
                >
                <button class="search-clear" id="search-clear" style="display: none;">×</button>
            </div>

            <!-- MENU SECTIONS -->
            <div id="menu-container"></div>
            
            <!-- NO RESULTS MESSAGE -->
            <div class="no-results" id="no-results" style="display: none;">
                <svg aria-hidden="true" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-muted)" stroke-width="1">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <p>Блюда не найдены для "<span id="search-query"></span>"</p>
            </div>
        </main>

        <!-- CART PANEL -->
        <aside class="cart-panel" id="cart-panel" aria-label="Корзина">
            <div class="cart-header">
                <h3>Ваш выбор</h3>
                <div class="cart-table-info" id="cart-table-info"></div>
            </div>
            <div class="cart-content" id="cart-content"></div>
            <div class="cart-empty" id="cart-empty">
                <svg aria-hidden="true" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-muted)" stroke-width="1.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M8 12h8"></path>
                </svg>
                <p>Корзина пуста. Выберите блюда из меню.</p>
            </div>
            <div class="cart-summary" id="cart-summary" style="display: none;">
                <div class="summary-row total">
                    <span>Итого</span>
                    <span id="total">0 ₽</span>
                </div>
                <button class="checkout-btn" id="clear-cart-btn" type="button">Очистить выбор</button>
            </div>
        </aside>
    </div>

    <!-- Mobile overlay + bottom bar -->
    <div class="cart-overlay" id="cart-overlay" aria-hidden="true"></div>
    <div class="mobile-bottom-bar" id="mobile-bottom-bar">
        <div class="bottom-bar-info">
            <div class="bottom-bar-count" id="bottom-bar-count">0 позиций</div>
            <div class="bottom-bar-total" id="bottom-bar-total">0 ₽</div>
        </div>
        <button class="bottom-bar-btn" id="bottom-bar-btn" type="button">Корзина</button>
    </div>
    
    <script src="../static/js/main.js" defer></script>
    <script src="../static/js/cart.js" defer></script>
    <script src="../static/js/menu.js" defer></script>
</body>
</html>
