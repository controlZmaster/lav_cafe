<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена - Лав Кафé</title>
    <link rel="stylesheet" href="../static/css/base.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .error-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                ellipse 80% 60% at 50% 50%,
                rgba(187, 148, 87, 0.1) 0%,
                transparent 70%
            );
            pointer-events: none;
        }
        
        .error-container {
            max-width: 600px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        
        .error-animation {
            margin-bottom: 2rem;
            position: relative;
            height: 200px;
        }
        
        .error-number {
            font-family: var(--font-display);
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 700;
            background: linear-gradient(135deg, #BB9457 0%, #FFE6A7 50%, #BB9457 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin: 0;
            animation: shimmer 3s ease-in-out infinite;
            background-size: 200% 100%;
        }
        
        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .floating-icon {
            position: absolute;
            animation: float 3s ease-in-out infinite;
        }
        
        .floating-icon:nth-child(1) {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }
        
        .floating-icon:nth-child(2) {
            top: 60%;
            right: 15%;
            animation-delay: 1s;
        }
        
        .floating-icon:nth-child(3) {
            bottom: 20%;
            left: 20%;
            animation-delay: 2s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .error-icon {
            width: 40px;
            height: 40px;
            opacity: 0.3;
        }
        
        .error-title {
            font-family: var(--font-display);
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            color: var(--color-cream);
            margin-bottom: 1rem;
        }
        
        .error-message {
            font-size: 1.125rem;
            color: var(--color-text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .error-ornament {
            width: 120px;
            height: 30px;
            margin: 2rem auto;
            opacity: 0.5;
        }
        
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .btn:hover::before {
            opacity: 1;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #BB9457 0%, #99582A 100%);
            color: #1a0e0a;
            border: 2px solid transparent;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(187, 148, 87, 0.3);
        }
        
        .btn-outline {
            background: transparent;
            color: var(--color-gold);
            border: 2px solid var(--color-gold);
        }
        
        .btn-outline:hover {
            background: rgba(187, 148, 87, 0.1);
            transform: translateY(-2px);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--color-text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        
        .back-link:hover {
            color: var(--color-gold);
        }
        
        @media (max-width: 768px) {
            .error-number {
                font-size: 8rem;
            }
            
            .error-actions {
                flex-direction: column;
                align-items: stretch;
            }
            
            .btn {
                justify-content: center;
            }
            
            .floating-icon {
                display: none;
            }
        }
    </style>
</head>
<body class="page-enter">
    <div class="error-page">
        <div class="error-container">
            <div class="error-animation">
                <h1 class="error-number">404</h1>
                
                <!-- Floating decorative icons -->
                <div class="floating-icon">
                    <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="var(--color-gold)" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 6v6l4 2"></path>
                    </svg>
                </div>
                <div class="floating-icon">
                    <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="var(--color-gold)" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                    </svg>
                </div>
                <div class="floating-icon">
                    <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="var(--color-gold)" stroke-width="2">
                        <path d="M20 21v-8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8"></path>
                        <path d="M2 21h20"></path>
                    </svg>
                </div>
            </div>
            
            <svg aria-hidden="true" class="error-ornament" viewBox="0 0 120 30" xmlns="http://www.w3.org/2000/svg">
                <line x1="0" y1="15" x2="45" y2="15" stroke="#BB9457" stroke-width="1"/>
                <rect x="50" y="10" width="10" height="10" fill="none" stroke="#BB9457" stroke-width="1" transform="rotate(45 55 15)"/>
                <line x1="65" y1="15" x2="120" y2="15" stroke="#BB9457" stroke-width="1"/>
            </svg>
            
            <h2 class="error-title">Страница не найдена</h2>
            
            <p class="error-message">
                К сожалению, страница, которую вы ищете, не существует или была перемещена.<br>
                Возможно, вы ошиблись в адресе или страница была удалена.
            </p>
            
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                    На главную
                </a>
                <a href="menu.html" class="btn btn-outline">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                    Посмотреть меню
                </a>
            </div>
            
            <a href="javascript:history.back()" class="back-link">← Вернуться назад</a>
        </div>
    </div>
    
    <script src="../static/js/main.js" defer></script>
</body>
</html>
