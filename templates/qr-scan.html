<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR Code - Лав Кафé</title>
    <link rel="stylesheet" href="../static/css/base.css">
    <link rel="stylesheet" href="../static/css/auth.css">
    <style>
        .qr-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(ellipse at center, rgba(111, 29, 27, 0.25) 0%, var(--color-bg) 70%);
            padding: 2rem 1rem;
        }
        
        .logout-link {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            color: var(--color-text-muted);
            font-size: 0.9rem;
            transition: color var(--transition);
            z-index: 10;
        }
        
        .logout-link:hover {
            color: var(--color-gold);
        }
        
        .qr-container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .qr-ornament {
            width: 100px;
            height: 30px;
            margin: 0 auto 1.5rem;
        }
        
        .qr-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #BB9457 0%, #FFE6A7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .qr-subtitle {
            font-size: 1rem;
            color: var(--color-text-muted);
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .scanner-box {
            width: 320px;
            height: 320px;
            margin: 0 auto 1.5rem;
            position: relative;
            background: #1a0e0a;
            border: 2px solid var(--color-gold);
            border-radius: var(--radius);
            overflow: hidden;
            animation: borderPulse 2s ease-in-out infinite;
        }
        
        @keyframes borderPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(187, 148, 87, 0.3); }
            50% { box-shadow: 0 0 25px rgba(187, 148, 87, 0.6); }
        }
        
        .scanner-box.success {
            border-color: #4caf50;
            animation: none;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.6);
        }
        
        .corner-bracket {
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: var(--color-gold);
            border-style: solid;
        }
        
        .corner-bracket.top-left {
            top: 10px;
            left: 10px;
            border-width: 3px 0 0 3px;
        }
        
        .corner-bracket.top-right {
            top: 10px;
            right: 10px;
            border-width: 3px 3px 0 0;
        }
        
        .corner-bracket.bottom-left {
            bottom: 10px;
            left: 10px;
            border-width: 0 0 3px 3px;
        }
        
        .corner-bracket.bottom-right {
            bottom: 10px;
            right: 10px;
            border-width: 0 3px 3px 0;
        }
        
        #qr-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--color-crimson), var(--color-gold), var(--color-crimson), transparent);
            animation: scanMove 2s linear infinite;
            box-shadow: 0 0 10px var(--color-gold);
        }
        
        @keyframes scanMove {
            0% { top: 0; }
            100% { top: 100%; }
        }
        
        .scanner-status {
            margin-top: 1rem;
            color: var(--color-text-muted);
            font-size: 0.95rem;
        }
        
        .scanning-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
        
        .success-overlay {
            position: absolute;
            inset: 0;
            background: rgba(76, 175, 80, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
            z-index: 5;
        }
        
        .success-overlay.show {
            display: flex;
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            animation: successPop 0.5s ease;
        }
        
        @keyframes successPop {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .success-text {
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .manual-input-section {
            margin-top: 2rem;
        }
        
        .separator {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }
        
        .separator::before,
        .separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }
        
        .manual-form {
            display: flex;
            gap: 1rem;
            max-width: 300px;
            margin: 0 auto;
        }
        
        .table-input {
            flex: 1;
            padding: 0.875rem 1rem;
            background: #1a0e0a;
            border: 2px solid var(--color-border);
            border-radius: 8px;
            color: var(--color-cream);
            font-size: 1rem;
            font-family: var(--font-body);
            transition: all var(--transition);
            outline: none;
        }
        
        .table-input:focus {
            border-color: var(--color-gold);
            box-shadow: 0 0 0 3px rgba(187, 148, 87, 0.3);
        }
        
        .confirm-btn {
            padding: 0.875rem 1.5rem;
            background: var(--color-crimson);
            color: var(--color-cream);
            border: 2px solid var(--color-crimson);
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition);
        }
        
        .confirm-btn:hover {
            background: transparent;
            color: var(--color-gold);
            border-color: var(--color-gold);
        }
        
        .info-note {
            margin-top: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }
        
        .table-icon {
            width: 30px;
            height: 30px;
        }
        
        @media (max-width: 768px) {
            .scanner-box {
                width: 280px;
                height: 280px;
            }
            
            .qr-title {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="qr-page">
        <a href="login.html" class="logout-link">← Déconnexion</a>
        
        <div class="qr-container">
            <svg class="qr-ornament" viewBox="0 0 100 30" xmlns="http://www.w3.org/2000/svg">
                <line x1="0" y1="15" x2="40" y2="15" stroke="#BB9457" stroke-width="1"/>
                <rect x="45" y="10" width="10" height="10" fill="none" stroke="#BB9457" stroke-width="1" transform="rotate(45 50 15)"/>
                <line x1="60" y1="15" x2="100" y2="15" stroke="#BB9457" stroke-width="1"/>
            </svg>
            
            <h1 class="qr-title">Scannez votre table</h1>
            <p class="qr-subtitle">Pointez votre caméra vers le QR code sur votre table</p>
            
            <div class="scanner-box" id="scanner-box">
                <div class="corner-bracket top-left"></div>
                <div class="corner-bracket top-right"></div>
                <div class="corner-bracket bottom-left"></div>
                <div class="corner-bracket bottom-right"></div>
                
                <video id="qr-video" autoplay playsinline></video>
                <div class="scan-line"></div>
                <canvas id="qr-canvas" style="display: none;"></canvas>
                
                <div class="success-overlay" id="success-overlay">
                    <div class="success-icon">✓</div>
                    <div class="success-text" id="success-text">Table détectée !</div>
                </div>
            </div>
            
            <div class="scanner-status">
                <span class="scanning-dots" id="scanner-status">Scan en cours</span>
            </div>
            
            <div class="manual-input-section">
                <div class="separator">ou entrez le numéro manuellement</div>
                
                <form class="manual-form" id="manual-form">
                    <input 
                        type="number" 
                        id="table-number" 
                        class="table-input" 
                        placeholder="N° de table"
                        min="1" 
                        max="20"
                        required
                    >
                    <button type="submit" class="confirm-btn">Confirmer</button>
                </form>
            </div>
            
            <div class="info-note">
                <svg class="table-icon" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
                    <rect x="5" y="10" width="20" height="15" rx="2" fill="none" stroke="var(--color-gold)" stroke-width="1.5"/>
                    <line x1="8" y1="25" x2="8" y2="28" stroke="var(--color-gold)" stroke-width="1.5"/>
                    <line x1="22" y1="25" x2="22" y2="28" stroke="var(--color-gold)" stroke-width="1.5"/>
                    <rect x="10" y="14" width="10" height="7" fill="var(--color-gold)" opacity="0.3"/>
                    <path d="M 12 16 L 14 16 M 14 14 L 14 18 M 16 16 L 18 16 M 16 14 L 16 18" stroke="var(--color-dark-brown)" stroke-width="0.5"/>
                </svg>
                <span>Le QR code se trouve sur le support au centre de votre table</span>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script src="../static/js/main.js" defer></script>
    <script src="../static/js/qr-scanner.js" defer></script>
</body>
</html>
