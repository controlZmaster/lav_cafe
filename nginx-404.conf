# Configuration Nginx pour Лав Кафé - Gestion des erreurs 404
# À inclure dans votre fichier de configuration Nginx principal

server {
    listen 80;
    server_name votre-domaine.com;
    
    root /chemin/vers/lav-cafe;
    index index.html;
    
    # Page d'erreur 404 personnalisée
    error_page 404 /templates/404.html;
    
    # Autres pages d'erreur (optionnel)
    error_page 403 /templates/404.html;
    error_page 500 502 503 504 /templates/404.html;
    
    # Localisation de la page 404
    location = /templates/404.html {
        internal;
    }
    
    # Désactiver l'affichage des répertoires
    autoindex off;
    
    # Compression GZIP
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
    
    # Cache des ressources statiques
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Sécurité - Bloquer l'accès aux fichiers sensibles
    location ~ /\. {
        deny all;
    }
    
    location ~ \.(htaccess|htpasswd|ini|log|sh|sql)$ {
        deny all;
    }
    
    # Gestion des routes pour SPA (si nécessaire)
    location / {
        try_files $uri $uri/ =404;
    }
}
